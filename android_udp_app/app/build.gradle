plugins {
    id 'com.android.application'
}
android {
    namespace 'com.gyro.udp'
    compileSdk 34
    defaultConfig {
        applicationId "com.gyro.udp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
