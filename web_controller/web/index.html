<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Controller</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Gyro Controller</h1>
        <div id="status" class="status disconnected">Disconnected</div>
        
        <div class="controls">
            <button id="connectBtn" class="btn primary">Connect & Start Gyro</button>
            <button id="calibrateBtn" class="btn secondary" disabled>Calibrate Center</button>
        </div>

        <div class="debug-info">
            <div class="data-row"><span>Alpha (Z):</span> <span id="valAlpha">0.00</span></div>
            <div class="data-row"><span>Beta (X):</span> <span id="valBeta">0.00</span></div>
            <div class="data-row"><span>Gamma (Y):</span> <span id="valGamma">0.00</span></div>
            <div class="data-row"><span>Rate:</span> <span id="valRate">0 Hz</span></div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
